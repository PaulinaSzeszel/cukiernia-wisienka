<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--=============== FAVICON ===============-->
    <link
      rel="shortcut icon"
      href="assets/img/favicon.png"
      type="image/x-icon"
    />

    <!--=============== REMIXICONS - Insert link for icons ===============-->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
    />

    <!--=============== SWIPER CSS - Insert link for swiperjs ===============-->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />

    <!--=============== CSS ===============-->
    <link rel="stylesheet" href="assets/css/style.css" />
    <title>Cukiernia Wisienka</title>
  </head>
  <body>
    <!--==================== HEADER & NAV ====================-->
    <header class="header" id="header">
      <nav class="nav container">
        <a href="/index.html" class="nav__logo">
          <img src="assets/img/logo.svg" alt="Logo Wisienka" />
          <span>Wisienka</span>
        </a>
        <div class="nav__menu" id="nav-menu">
          <ul class="nav__list">
            <li>
              <a href="#home" class="nav__link">Strona główna</a>
            </li>

            <li>
              <a href="#about" class="nav__link">O Nas</a>
            </li>

            <li>
              <a href="#product" class="nav__link">Produkty</a>
            </li>

            <li>
              <a href="#new" class="nav__link">Nowości</a>
            </li>

            <li>
              <a href="#contact" class="nav__link">Kontakt</a>
            </li>
          </ul>

          <!-- Close -->
           <button class="nav__close" id="nav-close" aria-label="Close menu">
            <i class="ri-close-large-line"></i>
           </button>

           <img src="assets/img/leaf-3.png" alt="" class="nav__img">
        </div>

        <!-- Toggle -->
        <button class="nav__toggle" id="nav-toggle" aria-label="Toggle menu">
          <i class="ri-apps-2-line"></i>
        </button>

      </nav>
    </header>

    <!--==================== MAIN ====================-->
    <main class="main">
      <!--==================== HOME SECTION ====================-->
      <section class="home section" id="home"></section>

      <!--==================== ABOUT SECTION ====================-->
      <section class="about section" id="about"></section>

      <!--==================== PRODUCTS SECTION ====================-->
      <section class="product section" id="product"></section>

      <!--==================== NEW SECTION ====================-->
      <section class="new section" id="new"></section>

      <!--==================== CONTACT SECTION ====================-->
      <section class="contact section" id="contact"></section>
    </main>

    <!--==================== FOOTER ====================-->
    <footer class="footer"></footer>

    <!--========== SCROLL UP ==========-->

    <!--=============== SCROLLREVEAL - Insert link for animations ===============-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/scrollReveal.js/4.0.9/scrollreveal.min.js"></script>

    <!--=============== SWIPER JS - Insert link for swiperjs ===============-->
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>

    <!--=============== MAIN JS ===============-->
    <script src="assets/js/main.js"></script>
  </body>
</html>
